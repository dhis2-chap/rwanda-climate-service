- id: esa_worldcover_2021
  name: ESA WorldCover 10m 2021
  description: >
    ESA WorldCover 10m landcover classification for 2021 (v200), fetched from
    the AWS Open Data public S3 bucket (s3://esa-worldcover). No credentials
    required. Tiles are downloaded on first use and cached at ~/.cache/chap-gis/.

    Classes (integer codes):
      10  Tree cover
      20  Shrubland
      30  Grassland
      40  Cropland
      50  Built-up
      60  Bare / sparse vegetation
      70  Snow and ice
      80  Permanent water bodies
      90  Herbaceous wetland
      95  Mangroves
      100 Moss and lichen

  variable: landcover
  period_type: yearly
  sync:
    kind: static
  extents:
    spatial:
      bbox: [-180, -90, 180, 90]
    temporal:
      begin: "2021"
      end: "2021"
      resolution: P1Y
  ingestion:
    plugin: datasets.worldcover.WorldCoverPlugin
    params: {}
  units: "1"
  resolution: 10 m
  source: ESA WorldCover v200
  source_url: https://esa-worldcover.org
  display:
    colormap: tab10
    range: [10, 100]
